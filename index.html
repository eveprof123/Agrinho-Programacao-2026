<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEMAG - Contato e Horários</title>
    <style>
        /* Estilos Globais */
        :root {
            --primary-blue: #002147; /* Cor escura do título */
            --text-blue: #003366; /* Cor escura do texto */
            --icon-pink: #eb0a8b; /* Cor do ícone de telefone */
            --icon-orange: #f39100; /* Cor do ícone de endereço e botão */
            --background-cream: #f9f7f4; /* Cor de fundo creme */
            --white: #ffffff;
            --gray-light: #f0f0f0;
        }

        body {
            font-family: 'Open Sans', sans-serif; /* Fonte limpa e profissional */
            background-color: var(--background-cream);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container Principal da Seção */
        .school-info-section {
            display: flex;
            flex-direction: row; /* Três colunas horizontais */
            justify-content: space-between;
            align-items: center;
            background-color: var(--white);
            border-radius: 20px; /* Cantos arredondados do container */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* Sombra sutil */
            padding: 40px;
            max-width: 1200px;
            width: 100%;
            gap: 30px; /* Espaço entre as seções */
        }

        /* Seções Internas */
        .info-block {
            flex: 1; /* Distribui o espaço igualmente */
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* Títulos */
        .info-block h2 {
            font-family: 'Georgia', serif; /* Fonte serifada para títulos */
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-blue);
            margin-top: 0;
            margin-bottom: 30px;
        }

        /* Detalhes de Contato */
        .contact-details {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .contact-details li {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
            color: var(--text-blue);
            font-weight: bold;
        }

        .contact-details li:last-child {
            margin-bottom: 0;
        }

        /* Ícones de Contato */
        .contact-details .icon {
            font-size: 1.5rem;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .icon-phone {
            color: var(--icon-pink);
        }

        .icon-address {
            color: var(--icon-orange);
        }

        /* Detalhes de Endereço */
        .address-sub-details {
            display: flex;
            flex-direction: column;
            font-weight: normal; /* Texto de endereço não é negrito */
            margin-top: 5px;
        }

        /* Botão do Maps */
        .btn-google-maps {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--icon-orange);
            color: var(--white);
            border: none;
            border-radius: 10px; /* Cantos arredondados do botão */
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            max-width: 250px;
            font-size: 1rem;
            transition: background-color 0.3s;
        }

        .btn-google-maps:hover {
            background-color: #d88100; /* Laranja mais escuro no hover */
        }

        .btn-google-maps .icon {
            margin-right: 10px;
            font-size: 1.2rem;
        }

        /* Contêiner do Mapa */
        .map-container {
            flex: 1.2; /* Mapa um pouco mais largo */
            border-radius: 15px; /* Cantos arredondados do mapa */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Imagem de Pré-visualização do Mapa (Substituível por Iframe) */
        .map-preview {
            width: 100%;
            height: 350px; /* Altura do mapa */
            object-fit: cover;
            border: none;
        }

        /* Detalhes de Horário */
        .schedule-details {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .schedule-details li {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            color: var(--text-blue);
            font-weight: bold;
        }

        .schedule-details li:last-child {
            margin-bottom: 0;
        }

        /* Ícones de Horário Estilizados */
        .schedule-details .icon {
            font-size: 2.2rem;
            margin-right: 15px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Cores Específicas dos Ícones de Horário */
        .icon-morning {
            color: var(--icon-pink);
        }

        .icon-afternoon {
            color: var(--icon-orange);
        }

        .icon-night {
            color: var(--primary-blue);
        }

        /* Ajustes para Dispositivos Móveis */
        @media (max-width: 900px) {
            .school-info-section {
                flex-direction: column;
                align-items: stretch;
                padding: 30px;
            }

            .map-container {
                margin-top: 30px;
                margin-bottom: 30px;
            }

            .info-block {
                align-items: center;
            }

            .btn-google-maps {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <section class="school-info-section">
        
        <div class="info-block contact-block">
            <h2>Entre em Contato</h2>
            <ul class="contact-details">
                <li>
                    <span class="icon icon-phone">📞</span>
                    <div><strong>Telefone:</strong> (42) 3276-1274</div>
                </li>
                <li>
                    <span class="icon icon-address">📍</span>
                    <div>
                        <strong>Endereço:</strong>
                        <div class="address-sub-details">
                            Rua Polônia, 905, Centro
                            Rua Polônia, 905, Centro
                        </div>
                    </div>
                </li>
            </ul>
            <button class="btn-google-maps">
                <span class="icon">🗺️</span> Ver no Google Maps
            </button>
        </div>

        <div class="map-container">
            <img src="https://i.imgur.com/8Q8o3tZ.png" alt="Pré-visualização do Mapa do Colégio" class="map-preview">
        </div>

        <div class="info-block schedule-block">
            <h2>Horário de Secretaria</h2>
            <ul class="schedule-details">
                <li>
                    <span class="icon icon-morning">☀️🕒</span>
                    <div><strong>Manhã:</strong> 07:30 às 11:45</div>
                </li>
                <li>
                    <span class="icon icon-afternoon">☀️🕒</span>
                    <div><strong>Tarde:</strong> 13:00 às 17:30</div>
                </li>
                <li>
                    <span class="icon icon-night">🌙🕒</span>
                    <div><strong>Noite:</strong> 18:30 às 22:30</div>
                </li>
            </ul>
        </div>

    </section>

</body>
</html>
